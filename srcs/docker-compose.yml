services:
  mariadb:
    build:
      context: ./requirements/mariadb
    container_name: mariadb
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - inception
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-uroot"]
      interval: 5s
      timeout: 3s
      retries: 10
  wordpress:
    build:
      context: ./requirements/wordpress
    container_name: wp-php
    depends_on:
      - mariadb
    volumes:
      - wordpress_data:/var/www/localhost/htdocs
    networks:
      - inception
  nginx:
    build:
      context: ./requirements/nginx
    container_name: nginx
    depends_on:
      - wordpress
    ports:
      - "443:443"
    volumes:
      - wordpress_data:/var/www/localhost/htdocs
    networks:
      - inception
volumes:
  mariadb_data:
  wordpress_data:
networks:
  inception:
    driver: bridge