networks:
  inception:
    driver: bridge

volumes:
  mariadb_data:
    name: mariadb_data
    driver: local
    driver_opts:
      type: none
      device: "/home/${USER}/data/mariadb"
      o: bind
  
  wordpress_data:
    name: wordpress_data
    driver: local
    driver_opts:
      type: none
      device: "/home/${USER}/data/wordpress"
      o: bind

services:
  mariadb:
    build:
      context: ./requirements/mariadb
    container_name: mariadb
    restart: always
    env_file:
      - .env
    environment:
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
    secrets:
      - db_password
      - db_root_password
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - inception
    expose:
      - "3306"
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin --protocol=SOCKET --socket=/run/mysqld/mysqld.sock ping -uroot -p$(cat /run/secrets/db_root_password)"]
      interval: 5s
      timeout: 3s
      retries: 10
  wordpress:
    build:
      context: ./requirements/wordpress
    container_name: wp-php
    restart: always
    depends_on:
      mariadb:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_HOST=${MYSQL_HOST}
      - WP_URL=${WP_URL}
      - WP_TITLE=${WP_TITLE}
      - WP_ADMIN_USER=${WP_ADMIN_USER}
      - WP_ADMIN_EMAIL=${WP_ADMIN_EMAIL}
    secrets:
      - db_password
      - wp_admin_password
    volumes:
      - wordpress_data:/var/www/localhost/htdocs
    networks:
      - inception
    expose:
      - "9000"
      - "3306"
  nginx:
    build:
      context: ./requirements/nginx
    container_name: nginx
    restart: always
    depends_on:
      - wordpress
    ports:
      - "443:443"
    expose:
      - "9000"
    volumes:
      - wordpress_data:/var/www/localhost/htdocs
    networks:
      - inception

secrets:
  db_password:
    file: ./secrets/db_password.txt
  db_root_password:
    file: ./secrets/db_root_password.txt
  wp_admin_password:
    file: ./secrets/wp_admin_password.txt